experiment:
  name: Darcy Flow Generation
  seed: 43
  simulator_type: DARCY
  reduced_model_type: FIM
  output_dir: datasets/dataset_DARCY_cov2
viz_settings:
  plot_interval: 1
  plot_vector_count: 5
  plots_dir: datasets/dataset_DARCY_cov2/plots
data_settings:
  num_samples: 200
  num_workers: 1
  num_subsamples: 1000
  data_dir: datasets/dataset_DARCY_cov2/samples
simulator_settings:
  size: 128
  T: 50000
reduced_model_settings:
  probe_size: 256
  noise_std: 0.5
  eigen_value_fraction: 0.01
  eigen_vector_count: 700
