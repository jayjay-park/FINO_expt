experiment:
  name: "Darcy Flow Generation"
  seed: 45
  simulator_type: "DARCY"
  reduced_model_type: "FIM" # "FIM" or "RAND"
  output_dir: "datasets/dataset_DARCY_KL4"

viz_settings:
  plot_interval: 1
  plot_vector_count: 5
  plots_dir: "datasets/dataset_DARCY_KL4/plots"

data_settings:
  num_samples: 200 #1000
  num_workers: 1
  num_subsamples: 200
  data_dir: "datasets/dataset_DARCY_KL4/samples"

simulator_settings:
  size: 128 # Grid size
  T: 5000

reduced_model_settings:
  probe_size: 256 #10
  noise_std: 0.01
  eigen_value_fraction: 0.01
  eigen_vector_count: 400 # Overrides eigen_value_fraction if set