experiment:
  name: "Navier Stokes Generation"
  seed: 42
  simulator_type: "NS"
  reduced_model_type: "FIM" # "FIM" or "RAND"
  output_dir: "datasets/dataset_NS"

viz_settings:
  plot_interval: 1
  plot_vector_count: 5
  plots_dir: "datasets/dataset_NS/plots"

data_settings:
  num_samples: 200
  num_workers: 1
  num_subsamples: 200 # 200
  data_dir: "datasets/dataset_NS/samples"

simulator_settings:
  s1: 64 # Grid size
  s2: 64 # Grid size
  scale: 10.0
  T: 15.0
  Re: 200
  adaptive: False
  delta_t: 1e-3
  nburn: 0
  nsteps: 500

reduced_model_settings:
  probe_size: 80 #256
  noise_std: 0.1
  eigen_value_fraction: 0.01
  eigen_vector_count: 500 # Overrides eigen_value_fraction if set
