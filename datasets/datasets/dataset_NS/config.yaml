experiment:
  name: Navier Stokes Generation
  seed: 42
  simulator_type: NS
  reduced_model_type: FIM
  output_dir: datasets/dataset_NS
viz_settings:
  plot_interval: 1
  plot_vector_count: 1
  plots_dir: datasets/dataset_NS/plots
data_settings:
  num_samples: 4
  num_workers: 1
  data_dir: datasets/dataset_NS/samples
simulator_settings:
  s1: 128
  s2: 128
  scale: 50.0
  T: 0.1
  Re: 100
  adaptive: true
  delta_t: 0.001
  nburn: 0
  nsteps: 100
reduced_model_settings:
  eigen_value_fraction: 0.01
  eigen_vector_count: 256
